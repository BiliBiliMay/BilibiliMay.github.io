---
layout: default
---
<article class="post-sheet">
  <header class="post-header">
    <p class="kicker">Post</p>
    <h1>{{ page.title }}</h1>
    <p class="post-date">{{ page.date | date: "%B %-d, %Y" }}</p>
  </header>

  <div class="post-content">
    {{ content }}
  </div>

  <footer class="post-footer">
    <a href="{{ '/' | relative_url }}">Back to posts</a>
  </footer>
</article>
